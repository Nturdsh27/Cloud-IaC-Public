name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch: {}

permissions:
  pages: write
  id-token: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v4.2.2

      - uses: actions/setup-python@v5 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material pymdown-extensions

      - name: Build docs
        run: mkdocs build --config-file docs/mkdocs.yml --site-dir ../site

      - uses: actions/upload-pages-artifact@v3 # v3.0.1
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4 # v4.0.5
