site_name: DevSecOps Starter Kit
site_description: Production-ready, secure-by-default GCP infrastructure modules for startups
site_url: https://nturdsh27.github.io/Cloud-IaC-Public/
repo_url: https://github.com/Nturdsh27/Cloud-IaC-Public
repo_name: Nturdsh27/Cloud-IaC-Public
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Installation: getting-started/installation.md
      - Your First Scan: getting-started/first-scan.md
  - Modules:
      - Overview: modules/index.md
      - Cloud Foundation:
          - Landing Zone: modules/landing-zone.md
          - IAM & Workload Identity: modules/iam.md
      - Security Pipeline:
          - Multi-Scanner CI/CD: modules/multi-scanner.md
          - Container Signing (Cosign): modules/cosign.md
      - Policy & Compliance:
          - Policy-as-Code (OPA): modules/policy-as-code.md
      - Developer Experience:
          - Developer CLI: modules/cli.md
  - Architecture:
      - Overview: architecture/overview.md
      - Security Model: architecture/security-model.md
      - Tier Comparison: architecture/tier-comparison.md
  - Reference:
      - CLI Commands: reference/cli.md
      - Terraform Modules: reference/terraform-modules.md
      - GitHub Actions: reference/github-actions.md
  - Pricing: pricing.md
